services:
  braindump:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: braindump-web
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_SMALL: ${MODEL_SMALL:-small-3b}
      MODEL_FAST: ${MODEL_FAST:-fast-3b}
      MODEL_MID: ${MODEL_MID:-gpt-oss-120b}
      MODEL_ENTERPRISE: ${MODEL_ENTERPRISE:-gpt-5.4}
      BRAIN_DB_PATH: /data/braindump.db
      APP_API_KEY: ${APP_API_KEY:-dev-api-key}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
    volumes:
      - braindump_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  braindump_data:
