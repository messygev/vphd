services:
  braindump:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: braindump-web
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_SMALL: ${MODEL_SMALL:-small-3b}
      MODEL_FAST: ${MODEL_FAST:-fast-3b}
      MODEL_MID: ${MODEL_MID:-gpt-oss-120b}
      MODEL_ENTERPRISE: ${MODEL_ENTERPRISE:-gpt-5.4}
      BRAIN_DB_PATH: /data/braindump.db
    volumes:
      - braindump_data:/data
    restart: unless-stopped

volumes:
  braindump_data:
